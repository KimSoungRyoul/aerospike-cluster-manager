repos:
  # ── General ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^charts/.*/templates/
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: check-toml
      - id: detect-private-key

  # ── Python / Backend (ruff) ──────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ── Python / Backend (pyright) ───────────────────────────
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: bash -c 'cd backend && uv run pyright src/'
        language: system
        files: ^backend/src/.*\.py$
        types: [python]
        pass_filenames: false

  # ── Frontend (eslint + prettier + tsc) ──────────────────
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash -c 'args=(); for f in "$@"; do args+=("${f#frontend/}"); done; cd frontend && ./node_modules/.bin/eslint --fix "${args[@]}"' --
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        types: [file]

      - id: prettier
        name: prettier
        entry: bash -c 'args=(); for f in "$@"; do args+=("${f#frontend/}"); done; cd frontend && ./node_modules/.bin/prettier --write "${args[@]}"' --
        language: system
        files: ^frontend/.*\.(ts|tsx|json|md|css)$
        types: [file]

      - id: tsc
        name: tsc (type-check)
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        types: [file]
        pass_filenames: false
